<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCE</title>
    <link
      href="../../node_modules/@flaticon/flaticon-uicons/css/all/all.css"
      rel="stylesheet"
    />
    <link rel="icon" href="../../assets/logo/NCE/dark-logo.ico" />

    <link rel="stylesheet" href="../css/var.css" />
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="../css/editor.css" />
    <link rel="stylesheet" href="../css/bottomBar.css" />
    <link rel="stylesheet" href="../css/command.css" />
    <link rel="stylesheet" href="../css/tabManager.css" />
    <link rel="stylesheet" href="../css/scroller.css" />
    <link rel="stylesheet" href="../css/emptyMenu.css" />
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="../css/sidebar/fileExplorer.css" />

    <style>
      #fps {
        position: fixed;
        top: 10px;
        right: 10px;
        font-size: 16px;
        color: #ffffff;
        padding: 5px;
        user-select: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <section class="main-section">
      <div class="command box">
        <div class="command-header">
          <input
            type="search"
            class="command-search"
            placeholder="Search files by name"
          />
          <div class="command-body">
            <div class="command-els-top box-bottom"></div>
            <div class="command-els"></div>
          </div>
        </div>
      </div>
      <div class="sidebar-tab-selector box"></div>
      <div class="sidebar-left box">
        <div class="sidebar-menu"></div>
      </div>
      <div class="file-manager box-left box-top box-bottom">
        <ul class="files-ul"></ul>
      </div>
      <div class="editor box-left editor-empty">
        <div class="empty-menu"></div>
        <div class="line-numbers"></div>
        <div class="editor-output editor-select"></div>
        <div class="editor-caret editor-select"></div>
        <div class="editor-select-output editor-select"></div>
      </div>
      <div class="sidebar-right box">
        <div class="sidebar-menu"></div>
      </div>
      <div class="bottomBar box-top">
        <section class="left"></section>
        <section class="middle"></section>
        <section class="right">
          <div class="bottomBar-el scroller-open" id="config-space">
            <span class="scroller-title"></span>
          </div>
          <div class="bottomBar-el">
            <span class="bottomBar-cursorPos bottomBar-text"></span>
          </div>
        </section>
      </div>
    </section>
    <script src="../js/main/Tools.js"></script>

    <script src="../js/controller/SelectController.js"></script>
    <script src="../js/controller/WriterController.js"></script>
    <script src="../js/controller/LineController.js"></script>
    <script src="../js/controller/KeyBindingController.js"></script>

    <script src="../js/manager/TabManager.js"></script>
    <script src="../js/manager/SidebarManager.js"></script>
    <script src="../js/manager/ScrollerManager.js"></script>
    <script src="../js/manager/SavePopupManager.js"></script>
    <script src="../js/manager/ThreadManager.js"></script>
    <script src="../js/manager/FileLoader.js"></script>

    <script src="../js/sidebar/Sidebar.js"></script>
    <script src="../js/sidebar/FileExplorer.js"></script>

    <script src="../js/addon/BottomBar.js"></script>
    <script src="../js/addon/KeyBinding.js"></script>
    <script src="../js/addon/File.js"></script>
    <script src="../js/addon/Command.js"></script>
    <script src="../js/addon/Scroller.js"></script>
    <script src="../js/addon/EmptyMenu.js"></script>

    <script src="../js/commands/CMD.js"></script>
    <script src="../js/commands/Config_space.js"></script>

    <script src="../js/main/Cursor.js"></script>
    <script src="../js/main/Editor.js"></script>

    <script src="../config.js"></script>

    <script src="../js/main/Event.js"></script>

    <div id="fps"></div>

    <script>
      addEvent("DOMContentLoaded", function () {
        var fpsContainer = document.getElementById("fps");
        var lastTime;
        var fps = 0;

        function updateFPS() {
          var currentTime = performance.now();
          var deltaTime = currentTime - (lastTime || currentTime);
          lastTime = currentTime;

          fps = Math.round(1000 / deltaTime);
          requestAnimationFrame(updateFPS);
        }
        setInterval(() => {
          fpsContainer.textContent = "FPS: " + fps;
        }, 150);
        updateFPS();
      });
    </script>
  </body>
</html>
